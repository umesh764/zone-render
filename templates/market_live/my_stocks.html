<!DOCTYPE html>
<html>
<head>
    <title>My Stocks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        .buy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 My Portfolio</h1>
        <div class="nav-links">
            <a href="/market-live/">← Back to Market</a>
            <a href="/market-live/my-stocks">My Stocks</a>
        </div>
        
        {% if stocks %}
        <table>
            <thead>
                <tr><th>Symbol</th><th>Quantity</th><th>Total Invested</th></tr>
            </thead>
            <tbody>
                {% for stock in stocks %}
                <tr>
                    <td><strong>{{ stock.symbol }}</strong></td>
                    <td>{{ stock.quantity }}</td>
                    <td>₹{{ stock.invested }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty">
            <p>You don't own any stocks yet.</p>
            <p><a href="/market-live/">Start buying!</a></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
