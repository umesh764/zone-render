{% extends "base.html" %}
{% block title %}Market Live{% endblock %}
{% block content %}
<h1>Market Dashboard</h1>
<div class="stocks-grid">
    {% for stock in stocks %}
    <div class="stock-card">
        <h3>{{ stock.symbol }}</h3>
        <p>{{ stock.name }}</p>
        <div class="price" id="price-{{ stock.symbol }}">{{ stock.price }}</div>
        <input type="number" id="qty-{{ stock.symbol }}" placeholder="Qty" value="1">
        <button onclick="buyStock('{{ stock.symbol }}')">Buy</button>
        <button onclick="sellStock('{{ stock.symbol }}')">Sell</button>
    </div>
    {% endfor %}
</div>

<script>
function buyStock(symbol) {
    // Get price from the DOM
    var priceElement = document.getElementById('price-' + symbol);
    var price = priceElement ? parseFloat(priceElement.innerText) : 1000;
    var qty = document.getElementById('qty-' + symbol).value;
    
    if (!qty || parseInt(qty) <= 0) {
        alert('Please enter valid quantity');
        return;
    }
    
    var data = {
        symbol: symbol,
        quantity: parseInt(qty),
        price: price
    };
    
    console.log("Sending buy request:", data);
    
    fetch('/market-live/buy-stock', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        if (data.success) {
            alert('✅ ' + data.message + '\nTotal: ₹' + data.total);
        } else {
            alert('❌ Failed: ' + data.error);
        }
    })
    .catch(function(error) {
        alert('❌ Error: ' + error);
    });
}

function sellStock(symbol) {
    var priceElement = document.getElementById('price-' + symbol);
    var price = priceElement ? parseFloat(priceElement.innerText) : 1000;
    var qty = document.getElementById('qty-' + symbol).value;
    
    if (!qty || parseInt(qty) <= 0) {
        alert('Please enter valid quantity');
        return;
    }
    
    var data = {
        symbol: symbol,
        quantity: parseInt(qty),
        price: price
    };
    
    console.log("Sending sell request:", data);
    
    fetch('/market-live/sell-stock', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        if (data.success) {
            alert('✅ ' + data.message + '\nTotal: ₹' + data.total);
        } else {
            alert('❌ Failed: ' + data.error);
        }
    })
    .catch(function(error) {
        alert('❌ Error: ' + error);
    });
}
</script>
<style>
.stocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}
.stock-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
}
.price {
    font-size: 24px;
    font-weight: bold;
    color: #2196F3;
    margin: 10px 0;
}
.stock-card input {
    width: 80px;
    padding: 5px;
    margin: 5px;
}
.stock-card button {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 8px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 4px;
}
.stock-card button:last-child {
    background: #f44336;
}
</style>
{% endblock %}
