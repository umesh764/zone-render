<!DOCTYPE html>
<html>
<head>
    <title>Login - HAT PAY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #FF6B35, #FF4500); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 350px; }
        h2 { color: #FF6B35; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
        input:focus { outline: none; border-color: #FF6B35; }
        button { width: 100%; padding: 12px; background: #FF6B35; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background: #FF4500; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: #FF6B35; text-decoration: none; margin: 0 10px; }
        .flash-messages { margin-bottom: 20px; }
        .flash-success { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .flash-error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Login to HAT PAY</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
<!-- Social Login Section -->
<div class="social-login">
    <div class="divider">
        <span>OR CONTINUE WITH</span>
    </div>
    
    <div class="social-buttons">
        <a href="{{ url_for('auth.google_login') }}" class="social-btn google-btn">
            <i class="fab fa-google"></i> Google
        </a>
        <a href="{{ url_for('auth.facebook_login') }}" class="social-btn facebook-btn">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        <a href="{{ url_for('auth.github_login') }}" class="social-btn github-btn">
            <i class="fab fa-github"></i> GitHub
        </a>
    </div>
</div>

<style>
.social-login {
    margin-top: 2rem;
}
.divider {
    text-align: center;
    margin: 1.5rem 0;
    position: relative;
}
.divider::before,
.divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: #e0e0e0;
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.divider span {
    background: white;
    padding: 0 1rem;
    color: #999;
    font-size: 0.85rem;
}
.social-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}
.social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 0.75rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s ease;
    border: 1px solid #e0e0e0;
}
.google-btn {
    background: white;
    color: #333;
}
.google-btn:hover {
    background: #f8f8f8;
    border-color: #4285F4;
}
.facebook-btn {
    background: #1877F2;
    color: white;
    border: none;
}
.facebook-btn:hover {
    background: #166fe5;
}
.github-btn {
    background: #333;
    color: white;
    border: none;
}
.github-btn:hover {
    background: #24292e;
}
</style>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
                   <!-- ⬇️⬇️⬇️ YEH LINE ADD KI HAI - CSRF TOKEN ⬇️⬇️⬇️ -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label>📱 Mobile Number</label>
                <input type="tel" name="phone" pattern="[6-9][0-9]{9}" placeholder="10-digit mobile number" required>
            </div>
            
            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            
            <button type="submit">Login ➤</button>
        </form>
        
        <div class="links">
            <a href="{{ url_for('auth.register') }}">✨ New User? Register</a>
            <a href="{{ url_for('index') }}">🏠 Home</a>
        </div>
    </div>
</body>
</html>
