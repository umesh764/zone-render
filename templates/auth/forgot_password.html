<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - HAT PAY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #667eea; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password</h2>
        <p>Enter your registered mobile number</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background: {% if category == 'success' %}#d4edda{% else %}#f8d7da{% endif %}; 
                                color: {% if category == 'success' %}#155724{% else %}#721c24{% endif %}; 
                                padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <input type="tel" name="phone" placeholder="10-digit mobile number" required>
            </div>
            <button type="submit">Send OTP</button>
        </form>
        
        <a href="{{ url_for('auth.login') }}" class="back-link">← Back to Login</a>
    </div>
</body>
</html>
