<!DOCTYPE html>
<html>
<head>
    <title>Simple Market</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
        }
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stock-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stock-card h3 {
            color: #667eea;
            margin: 0 0 5px 0;
        }
        .price {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
            margin: 15px 0;
        }
        .stock-card input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }
        .buy-btn, .sell-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .buy-btn {
            background: #4CAF50;
            color: white;
        }
        .sell-btn {
            background: #f44336;
            color: white;
        }
        .nav-links {
            text-align: center;
            margin-top: 20px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            display: none;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Stock Market</h1>
        <div class="nav-links">
            <a href="/simple-market/">Market</a>
            <a href="/simple-market/portfolio">Portfolio</a>
        </div>
        
        <div class="stocks-grid">
            {% for stock in stocks %}
            <div class="stock-card">
                <h3>{{ stock.symbol }}</h3>
                <p>{{ stock.name }}</p>
                <div class="price">₹{{ stock.price }}</div>
                <input type="number" id="qty-{{ stock.symbol }}" value="1" min="1">
                <div>
                    <button class="buy-btn" onclick="buyStock('{{ stock.symbol }}', {{ stock.price }})">Buy</button>
                    <button class="sell-btn" onclick="sellStock('{{ stock.symbol }}', {{ stock.price }})">Sell</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        function showToast(msg, type) {
            let toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function buyStock(symbol, price) {
            let qty = document.getElementById(`qty-${symbol}`).value;
            fetch('/simple-market/buy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({symbol: symbol, quantity: qty, price: price})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) showToast('✅ ' + data.message, 'success');
                else showToast('❌ ' + data.error, 'error');
            })
            .catch(err => showToast('❌ Error: ' + err, 'error'));
        }
        
        function sellStock(symbol, price) {
            let qty = document.getElementById(`qty-${symbol}`).value;
            fetch('/simple-market/sell', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({symbol: symbol, quantity: qty, price: price})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) showToast('✅ ' + data.message, 'success');
                else showToast('❌ ' + data.error, 'error');
            })
            .catch(err => showToast('❌ Error: ' + err, 'error'));
        }
    </script>
</body>
</html>
